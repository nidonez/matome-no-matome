<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まとめのまとめ - 厳選アンテナ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .active-tab { border-bottom: 4px solid #f97316; color: #f97316; }
        .sub-nav-active { color: white; background-color: #f97316; border-radius: 9999px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-blue-700 text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center cursor-pointer" onclick="location.reload()">
                <i class="fa-solid fa-cat mr-2 text-orange-400"></i>まとめのまとめ
            </h1>
            <div class="flex flex-col items-end">
                <div id="status-badge" class="text-[9px] md:text-[10px] bg-blue-800 px-3 py-1 rounded-full border border-blue-500 mb-1 transition-colors duration-300">
                    <span id="data-status">同期中...</span>
                </div>
                <div id="debug-info" class="text-[8px] text-blue-300 font-mono"></div>
            </div>
        </div>
        
        <div class="bg-blue-900 overflow-x-auto hide-scrollbar border-t border-blue-800">
            <nav class="max-w-5xl mx-auto flex text-[11px] font-bold whitespace-nowrap" id="category-nav"></nav>
        </div>
        
        <div id="sub-category-bar" class="bg-blue-800 border-t border-blue-700 hidden">
            <nav class="max-w-5xl mx-auto px-3 py-2 flex gap-2 text-[10px] overflow-x-auto hide-scrollbar" id="sub-nav"></nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
            <!-- キャッシュで即時切り替わるタブ -->
            <div class="bg-white rounded-t-xl flex shadow-sm overflow-hidden border-b">
                <button onclick="changeTimeframe('new')" id="tab-new" class="tab-btn flex-1 py-4 text-[13px] font-bold active-tab">新着順</button>
                <button onclick="changeTimeframe('popular')" id="tab-popular" class="tab-btn flex-1 py-4 text-[13px] font-bold text-gray-500 border-l hover:bg-gray-50 transition">人気順（注目記事）</button>
            </div>

            <div id="article-list" class="bg-white rounded-b-xl shadow-sm divide-y divide-gray-100 min-h-[600px]">
                <div class="p-20 text-center text-gray-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4 text-blue-400"></i><br>
                    全100サイトから最新記事を収集・結合中...<br>
                    <span class="text-xs mt-2 block opacity-75">※初回のみ少し時間がかかります</span>
                </div>
            </div>
        </div>

        <aside class="space-y-6">
            <div class="bg-gray-200 h-[250px] rounded-xl flex items-center justify-center border-2 border-dashed border-gray-300 shadow-inner">
                <span class="text-gray-400 text-[10px] font-bold text-center">AD AREA<br>(300x250)</span>
            </div>
            
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold border-b pb-2 mb-3 text-sm text-blue-800"><i class="fa-solid fa-bolt mr-1 text-yellow-500"></i>取得サイト100件・超高速版</h3>
                <div class="text-[11px] text-gray-600 space-y-2">
                    <p>大手ニュースから海外の反応、アニメ、アイドル専門まで約100サイトを常時巡回しています。</p>
                    <p>※一度取得したデータは保存されるため、タブやカテゴリは<strong>通信なしで一瞬で切り替わります。</strong></p>
                </div>
            </div>

            <div class="bg-gray-200 h-[600px] rounded-xl flex items-center justify-center border-2 border-dashed border-gray-300 shadow-inner">
                <span class="text-gray-400 text-[10px] font-bold text-center">AD AREA<br>(300x600)</span>
            </div>
        </aside>
    </main>

    <footer class="py-20 text-center text-gray-400 text-[10px]">
        &copy; 2026 まとめのまとめ
    </footer>

            { name: '浮気ちゃんねる', domain: 'uwaki-channel', cat: 'ネタ・議論', sub: '男女・フェミ' },

            { name: 'ゲーハー黙示録', domain: 'geha-mokusiroku', cat: 'アニメ・ゲーム', sub: 'すべて' },

            // スポーツ

            { name: '市況かぶ全力２階建', domain: 'kabumatome', cat: 'マネー', sub: '資産運用' },

            { name: '乃木坂46まとめの仮', domain: 'nogizaka46tiu', cat: '女性アイドル', sub: '国内' },

            { name: '日向坂46まとめ', domain: 'hiraganatimes', cat: '女性アイドル', sub: '国内' },
            { name: 'AKB48タイムズ', domain: 'akb48taimuzu', cat: '女性アイドル', sub: '国内' },
            { name: 'デバク', domain: 'daebak', cat: '女性アイドル', sub: '韓流' },
            { name: 'K-POP速報', domain: 'kpopsokuhou', cat: '女性アイドル', sub: '韓流' },
            { name: '生駒ちゃんねる', domain: 'ikomach', cat: '女性アイドル', sub: '国内' },
            { name: '乃木りんく', domain: 'nogilink', cat: '女性アイドル', sub: '国内' },

            // 男性アイドル
            { name: 'ジャニーズ速報', domain: 'johnnys-matome', cat: '男性アイドル', sub: '国内' },
            { name: 'マゼンタ速報', domain: 'magentasokuhou', cat: '男性アイドル', sub: '国内' },
            { name: '嵐まとめ速報', domain: 'arashimatomesokuhou', cat: '男性アイドル', sub: '国内' },
            { name: 'K-POP男性まとめ', domain: 'kbps', cat: '男性アイドル', sub: '韓流' },
            { name: 'KPOP monster', domain: 'kpopmonster', cat: '男性アイドル', sub: '韓流' },

            // オカルト・乗り物・配信
            { name: '不思議.net', domain: 'world-fusigi', cat: 'オカルト', sub: '不思議・考察' },
            { name: '洒落怖まとめ', domain: 'sharekowa', cat: 'オカルト', sub: '怖い話' },
            { name: '不思議な体験', domain: 'fusigina', cat: 'オカルト', sub: '怖い話' },
            { name: '乗り物速報', domain: 'norisoku', cat: '車・乗り物', sub: 'すべて' },
            { name: 'クルマまとめ', domain: 'car-topics', cat: '車・乗り物', sub: 'すべて' },
            { name: 'VTuberまとめ', domain: 'vtuber-matome', cat: '動画・配信', sub: 'VTuber' },
            { name: 'ユーチュラ', domain: 'yutura', cat: '動画・配信', sub: 'YouTuber' }
        ];

        const categories = ['すべて', 'ニュース', '海外の反応', 'ネタ・議論', 'アニメ・ゲーム', 'スポーツ', 'マネー', '女性アイドル', '男性アイドル', 'オカルト', '動画・配信', '車・乗り物'];
        
        const subNavMap = {
            'ニュース': ['すべて', '話題の事件', '政治・経済', '国内', '海外'],
            '海外の反応': ['すべて', '海外で人気の話題', '日本への反応'],
            'ネタ・議論': ['すべて', '笑えるネタ', '炎上・ゴシップ', '男女・フェミ', '政治思想(右/左)'],
            'スポーツ': ['すべて', '野球', 'サッカー', '筋トレ'],
            'マネー': ['すべて', '資産運用', 'IT・ガジェット', '節約・家計', '仮想通貨'],
            '女性アイドル': ['すべて', '国内', '韓流'],
            '男性アイドル': ['すべて', '国内', '韓流'],
            'オカルト': ['すべて', '怖い話', '不思議・考察'],
            '動画・配信': ['すべて', 'YouTuber', 'VTuber'],
            '車・乗り物': ['すべて']
        };

        let currentTab = 'new';
        let currentCategory = 'すべて';
        let currentSubCategory = 'すべて';
        
        // キャッシュ用の変数
        let cachedArticles = [];
        let isDataLoaded = false;

        // 【通信は最初の一回だけ】GASからデータを取得してキャッシュに保存
        const fetchArticles = async () => {
            const listEl = document.getElementById('article-list');
            const statusBadge = document.getElementById('status-badge');
            const statusEl = document.getElementById('data-status');
            const debugEl = document.getElementById('debug-info');
            
            try {
                let data = null;
                let retries = 3;
                let backoff = 1000;
                
                while (retries > 0) {
                    try {
                        const response = await fetch(GAS_URL);
                        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                        data = await response.json();
                        break;
                    } catch (e) {
                        retries--;
                        if (retries === 0) throw e;
                        await new Promise(resolve => setTimeout(resolve, backoff));
                        backoff *= 2;
                    }
                }
                
                // データをキャッシュに保存
                cachedArticles = data;
                isDataLoaded = true;
                
                // バッジを緑色にして完了をアピール
                statusEl.textContent = "同期完了";
                statusBadge.classList.remove('bg-blue-800', 'border-blue-500');
                statusBadge.classList.add('bg-green-600', 'border-green-400');
                
                // 描画を実行
                renderArticles();

            } catch (err) {
                console.warn("Fetch Error:", err.message);
                listEl.innerHTML = `
                    <div class="p-8 mx-4 my-8 text-center text-red-500 text-sm bg-red-50 rounded-xl border border-red-200">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i><br>
                        <b class="text-base">記事データの同期に失敗しました</b><br>
                        <span class="text-xs opacity-70">(Failed to fetch)</span><br><br>
                        <div class="text-left inline-block text-[11px] text-gray-600 bg-white p-4 rounded border shadow-sm">
                            <b>【トラブルシューティング】</b><br>
                            1. GASの設定でアクセスを<b>「全員」</b>にしましたか？<br>
                            2. 新しいURLを正しく貼り付けましたか？<br>
                            3. 少し時間を置いて再読み込みしてください。
                        </div>
                    </div>`;
                statusEl.textContent = "同期エラー";
                debugEl.textContent = "通信失敗";
            }
        };

        // 【爆速】キャッシュからデータをフィルタリングして描画（通信なし）
        const renderArticles = () => {
            if (!isDataLoaded) return;
            
            const listEl = document.getElementById('article-list');
            const debugEl = document.getElementById('debug-info');
            
            // フィルタリング処理
            let filtered = cachedArticles.filter(item => {
                const site = whiteList.find(s => item.link.indexOf(s.domain) !== -1);
                if (!site) return false;
                if (currentCategory !== 'すべて' && site.cat !== currentCategory) return false;
                if (subNavMap[currentCategory] && currentSubCategory !== 'すべて') {
                    if (site.sub !== currentSubCategory) return false;
                }
                return true;
            });

            // ソート処理
            if (currentTab === 'new') {
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else {
                filtered.sort((a, b) => b.hatebu - a.hatebu);
            }

            listEl.innerHTML = '';
            debugEl.textContent = `全取得: ${cachedArticles.length}件 / 表示: ${filtered.length}件`;

            if (filtered.length === 0) {
                listEl.innerHTML = `
                    <div class="p-20 text-center text-gray-400">
                        表示できる記事がありません。<br>
                        <button onclick="currentCategory='すべて';currentSubCategory='すべて';renderNav();renderArticles();" class="mt-4 px-4 py-2 bg-blue-50 text-blue-600 rounded-full text-xs font-bold hover:bg-blue-100 transition">「すべて」に戻る</button>
                    </div>`;
                return;
            }

            // HTML生成
            filtered.forEach((item, index) => {
                const site = whiteList.find(s => item.link.indexOf(s.domain) !== -1);
                const rankHtml = currentTab !== 'new' ? `<div class="absolute -top-1 -left-1 w-5 h-5 bg-orange-500 text-white text-[10px] flex items-center justify-center rounded-full font-bold z-10 shadow-sm border border-white">${index+1}</div>` : '';
                const thumbId = btoa(item.link).slice(-10);
                
                listEl.insertAdjacentHTML('beforeend', `
                    <a href="${item.link}" target="_blank" class="block p-4 hover:bg-gray-50 transition relative group border-b border-gray-100 last:border-0">
                        ${rankHtml}
                        <div class="flex gap-4">
                            <div class="w-16 h-16 md:w-20 md:h-20 bg-gray-200 rounded-lg overflow-hidden flex-shrink-0 shadow-inner">
                                <img src="https://picsum.photos/seed/${thumbId}/150/100" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="thumb" loading="lazy">
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="text-[10px] text-gray-400 mb-1 flex justify-between">
                                    <span class="font-bold text-gray-600">${site.name}</span>
                                    <span>${timeAgo(new Date(item.date))}</span>
                                </div>
                                <h2 class="text-sm font-bold text-blue-700 leading-snug line-clamp-2 mt-1 mb-1 group-hover:underline decoration-blue-200 underline-offset-2">${item.title}</h2>
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] bg-blue-50 text-blue-500 px-1.5 py-0.5 rounded border border-blue-100 font-bold">B! ${item.hatebu}</span>
                                    <span class="text-[9px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">${site.cat}</span>
                                </div>
                            </div>
                        </div>
                    </a>`);
            });
        };

        const changeTimeframe = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.add('text-gray-500');
            });
            const btn = document.getElementById('tab-' + tab);
            btn.classList.add('active-tab');
            btn.classList.remove('text-gray-500');
            currentTab = tab;
            renderArticles(); // 通信せず描画のみ
        };

        const renderNav = () => {
            const nav = document.getElementById('category-nav');
            if (!nav) return;
            nav.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-3 transition ${currentCategory === cat ? 'text-orange-400 border-b-2 border-orange-400' : 'text-blue-200 hover:text-white'}`;
                btn.textContent = cat;
                btn.onclick = () => { 
                    currentCategory = cat; 
                    currentSubCategory = 'すべて'; 
                    renderNav(); 
                    renderSubNav(); 
                    renderArticles(); // 通信せず描画のみ
                };
                nav.appendChild(btn);
            });
        };

        const renderSubNav = () => {
            const subBar = document.getElementById('sub-category-bar');
            const subNav = document.getElementById('sub-nav');
            const subItems = subNavMap[currentCategory];
            if (subItems && subItems.length > 1) {
                subBar.classList.remove('hidden');
                subNav.innerHTML = '';
                subItems.forEach(sub => {
                    const btn = document.createElement('button');
                    const isActive = currentSubCategory === sub;
                    btn.className = `px-3 py-1 whitespace-nowrap border border-blue-600 transition ${isActive ? 'sub-nav-active' : 'text-blue-200 hover:text-white'}`;
                    btn.textContent = sub;
                    btn.onclick = () => { 
                        currentSubCategory = sub; 
                        renderSubNav(); 
                        renderArticles(); // 通信せず描画のみ
                    };
                    subNav.appendChild(btn);
                });
            } else {
                subBar.classList.add('hidden');
            }
        };

        const timeAgo = (date) => {
            if (isNaN(date.getTime())) return "不明";
            const diff = (new Date() - date) / 1000;
            if (diff < 3600) return Math.floor(Math.max(1, diff/60)) + '分前';
            if (diff < 86400) return Math.floor(diff/3600) + '時間前';
            return Math.floor(diff/86400) + '日前';
        };

        window.onload = () => {
            renderNav();
            renderSubNav();
            fetchArticles(); // 初回ロード時のみ通信
        };
    </script>
</body>
</html>
